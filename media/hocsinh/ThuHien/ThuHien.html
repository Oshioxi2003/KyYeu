<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title> Thu Hiền</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #fff0f6;
            text-align: center;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            padding: 60px 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 48px;
            animation: pop 1.5s ease-in-out infinite alternate;
        }

        @keyframes pop {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* STICKER */
        .sticker {
            position: absolute;
            font-size: 30px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-200px); opacity: 0; }
        }

        /* INFO */
        .info {
            background: white;
            margin: 30px auto;
            padding: 30px;
            width: 80%;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .info h2 {
            color: #ff4d6d;
        }

        /* AVATAR */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff9a9e;
            margin-bottom: 20px;
        }

        .info p {
            font-size: 18px;
            text-align: left;
            line-height: 1.8;
        }

        /* GALLERY */
        .gallery {
            margin: 40px 0;
        }

        .gallery h2 {
            color: #ff4d6d;
            cursor: pointer;
        }

        .images {
            display: none;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .images img {
            width: 220px;
            height: 280px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .images img:hover {
            transform: scale(1.08);
        }

        footer {
            margin: 50px 0;
            color: gray;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>💖 Hiền đâyyy 💖</h1>

        <div class="sticker" style="left:10%; animation-delay:0s;">✨</div>
        <div class="sticker" style="left:30%; animation-delay:2s;">💗</div>
        <div class="sticker" style="left:50%; animation-delay:1s;">🌸</div>
        <div class="sticker" style="left:70%; animation-delay:3s;">⭐</div>
        <div class="sticker" style="left:90%; animation-delay:4s;">💫</div>
    </div>

    <!-- INFO -->
    <div class="info">
        <!-- Ảnh đại diện -->
        <img src="image/chandung.jpg.jpg" class="avatar" alt="Ảnh chân dung">

        <h2>🌼 Giới thiệu 🌼</h2>
         <p><b>Họ và tên:</b> Lương Thu Hiền</p>
         <p><b>Lớp:</b> 12A6</p>
         <p><b> Ngày sinh:</b> 26/07/2008</p>
         <p><b> Sở thích:</b> ngủ, đọc sách, xem điện thoại</p>
     
    </div>

    <div class="gallery">
        <h2>💖 Thu Hiền💖</h2>
        <div class="images" style="display:flex;">
            <img src="image/lop10.jpg.jpg">
            <img src="image/lop11.jpg.jpg">
            <img src="image/lop12.jpg.jpg" >
        </div>
    </div>

    <footer>
        ✨ Thu Hiền – thanh xuân rực rỡ ✨
    </footer>

</body>
</html>
